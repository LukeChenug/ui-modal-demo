<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figma 图标技能 — Claude Code</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF9F6;
    --dark: #1a1a1a;
    --terracotta: #E07A5F;
    --terracotta-light: #F2C4B8;
    --terracotta-dark: #C4614A;
    --muted: #6b6b6b;
    --border: #E8E5DF;
    --card: #F4F2EE;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: var(--font);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 20px 40px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(250,249,246,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 15px; letter-spacing: -0.01em;
  }
  .nav-logo svg { width: 28px; height: 28px; }
  .nav-badge {
    font-size: 11px; font-weight: 500; color: var(--terracotta);
    background: rgba(224,122,95,0.1); border: 1px solid rgba(224,122,95,0.25);
    padding: 2px 8px; border-radius: 20px;
  }
  .nav-cta {
    background: var(--dark); color: var(--cream);
    padding: 9px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 500; text-decoration: none;
    transition: background 0.2s, transform 0.15s;
  }
  .nav-cta:hover { background: #333; transform: translateY(-1px); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: 120px 24px 80px;
    position: relative;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(224,122,95,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(224,122,95,0.05) 0%, transparent 60%);
  }
  .hero-grid {
    position: absolute; inset: 0; z-index: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 80%);
    opacity: 0.5;
  }
  .hero-content { position: relative; z-index: 1; max-width: 760px; }

  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--terracotta);
    background: rgba(224,122,95,0.08); border: 1px solid rgba(224,122,95,0.2);
    padding: 6px 14px; border-radius: 20px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease both;
  }
  .hero-eyebrow::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--terracotta); display: block;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 700; letter-spacing: -0.03em; line-height: 1.1;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.1s ease both;
  }
  h1 em { font-style: normal; color: var(--terracotta); }

  .hero-tagline {
    font-size: clamp(16px, 2vw, 20px);
    color: var(--muted); max-width: 520px; margin: 0 auto 48px;
    line-height: 1.7;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .hero-actions {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    animation: fadeUp 0.6s 0.3s ease both;
  }
  .btn-primary {
    background: var(--terracotta); color: white;
    padding: 14px 28px; border-radius: 10px;
    font-size: 15px; font-weight: 600; text-decoration: none;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(224,122,95,0.3);
  }
  .btn-primary:hover {
    background: var(--terracotta-dark);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(224,122,95,0.4);
  }
  .btn-secondary {
    background: transparent; color: var(--dark);
    padding: 14px 28px; border-radius: 10px;
    font-size: 15px; font-weight: 500; text-decoration: none;
    border: 1.5px solid var(--border);
    transition: border-color 0.2s, transform 0.15s;
  }
  .btn-secondary:hover { border-color: var(--dark); transform: translateY(-2px); }

  /* TERMINAL DEMO */
  .hero-demo {
    margin-top: 64px; width: 100%; max-width: 600px;
    animation: fadeUp 0.6s 0.4s ease both;
  }
  .terminal {
    background: #1a1a1a; border-radius: 12px;
    overflow: hidden; text-align: left;
    box-shadow: 0 24px 80px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.05);
  }
  .terminal-bar {
    background: #2a2a2a; padding: 12px 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .terminal-dot {
    width: 12px; height: 12px; border-radius: 50%;
  }
  .terminal-dot:nth-child(1) { background: #FF5F57; }
  .terminal-dot:nth-child(2) { background: #FFBD2E; }
  .terminal-dot:nth-child(3) { background: #28CA41; }
  .terminal-title {
    margin-left: auto; margin-right: auto;
    font-size: 12px; color: #666; font-family: monospace;
  }
  .terminal-body { padding: 20px 24px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; line-height: 1.8; }
  .t-prompt { color: #E07A5F; }
  .t-cmd { color: #FAF9F6; }
  .t-comment { color: #555; }
  .t-success { color: #28CA41; }
  .t-info { color: #7EB8F7; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* SECTION COMMON */
  section { padding: 100px 24px; }
  .section-inner { max-width: 1100px; margin: 0 auto; }
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--terracotta); margin-bottom: 16px;
  }
  .section-title {
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 700; letter-spacing: -0.025em; line-height: 1.15;
    margin-bottom: 16px;
  }
  .section-desc {
    font-size: 17px; color: var(--muted); max-width: 480px; line-height: 1.7;
  }

  /* FEATURE SECTIONS */
  .feature {
    border-top: 1px solid var(--border);
  }
  .feature-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 80px; align-items: center;
  }
  .feature-grid.reverse { direction: rtl; }
  .feature-grid.reverse > * { direction: ltr; }

  .feature-visual {
    background: var(--card);
    border-radius: 16px; border: 1px solid var(--border);
    padding: 40px; min-height: 360px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .feature-visual::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 60% at 50% 0%, rgba(224,122,95,0.06) 0%, transparent 70%);
  }

  .feature-text { padding: 20px 0; }
  .feature-number {
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px;
  }
  .feature-title {
    font-size: clamp(24px, 3vw, 40px);
    font-weight: 700; letter-spacing: -0.025em; line-height: 1.15;
    margin-bottom: 16px;
  }
  .feature-title em { font-style: normal; color: var(--terracotta); }
  .feature-desc {
    font-size: 16px; color: var(--muted); line-height: 1.75; margin-bottom: 32px;
  }
  .feature-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
  .feature-list li {
    display: flex; align-items: flex-start; gap: 12px;
    font-size: 15px; color: var(--dark);
  }
  .feature-list li::before {
    content: '';
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(224,122,95,0.12); border: 1.5px solid rgba(224,122,95,0.3);
    flex-shrink: 0; margin-top: 2px;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='8' viewBox='0 0 10 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4L3.5 6.5L9 1' stroke='%23E07A5F' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: center;
  }

  /* ICON GRID ILLUSTRATION */
  .icon-grid-demo {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    width: 100%; max-width: 320px;
  }
  .icon-cell {
    aspect-ratio: 1; background: white; border-radius: 10px;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .icon-cell:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .icon-cell svg { width: 28px; height: 28px; }
  .icon-cell.active { border-color: var(--terracotta); background: rgba(224,122,95,0.05); }
  .icon-cell.active svg { color: var(--terracotta); }

  /* ORGANIZE ILLUSTRATION */
  .organize-demo { width: 100%; max-width: 340px; }
  .org-frame {
    background: white; border-radius: 10px; border: 1px solid var(--border);
    padding: 14px; margin-bottom: 10px;
  }
  .org-frame-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
  }
  .org-icons { display: flex; gap: 8px; }
  .org-icon {
    width: 40px; height: 40px; border-radius: 8px;
    background: var(--card); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
  }
  .org-icon svg { width: 20px; height: 20px; }
  .org-frame.highlight { border-color: var(--terracotta); background: rgba(224,122,95,0.03); }
  .org-frame.highlight .org-frame-label { color: var(--terracotta); }

  /* SYNC ILLUSTRATION */
  .sync-demo { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 12px; }
  .sync-row {
    display: flex; align-items: center; gap: 12px;
    background: white; border-radius: 10px; border: 1px solid var(--border);
    padding: 12px 16px;
  }
  .sync-icon-box {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--card); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .sync-icon-box svg { width: 18px; height: 18px; }
  .sync-info { flex: 1; }
  .sync-name { font-size: 13px; font-weight: 500; }
  .sync-meta { font-size: 11px; color: var(--muted); }
  .sync-badge {
    font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px;
  }
  .sync-badge.done { background: rgba(40,202,65,0.1); color: #1a8a2e; }
  .sync-badge.pending { background: rgba(224,122,95,0.1); color: var(--terracotta); }

  /* STATS */
  .stats {
    background: var(--dark); color: var(--cream);
    border-top: none;
  }
  .stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: rgba(255,255,255,0.08);
    border-radius: 16px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .stat-item {
    padding: 48px 40px; background: var(--dark);
    text-align: center;
  }
  .stat-number {
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 700; letter-spacing: -0.03em;
    color: var(--terracotta); line-height: 1;
    margin-bottom: 8px;
  }
  .stat-label { font-size: 15px; color: rgba(250,249,246,0.5); }

  /* HOW IT WORKS */
  .how { border-top: 1px solid var(--border); }
  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; margin-top: 64px; }
  .step {
    padding: 32px; background: var(--card); border-radius: 16px;
    border: 1px solid var(--border); position: relative;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .step:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.06); }
  .step-num {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(224,122,95,0.1); border: 1.5px solid rgba(224,122,95,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--terracotta);
    margin-bottom: 20px;
  }
  .step h3 { font-size: 18px; font-weight: 600; margin-bottom: 10px; letter-spacing: -0.01em; }
  .step p { font-size: 14px; color: var(--muted); line-height: 1.7; }
  .step-connector {
    position: absolute; top: 50px; right: -17px; z-index: 1;
    color: var(--border);
  }

  /* CTA */
  .cta-section {
    border-top: 1px solid var(--border);
    text-align: center;
  }
  .cta-box {
    background: var(--dark); border-radius: 24px;
    padding: 80px 48px; position: relative; overflow: hidden;
  }
  .cta-box::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 80% at 50% 0%, rgba(224,122,95,0.15) 0%, transparent 60%);
  }
  .cta-box > * { position: relative; z-index: 1; }
  .cta-box h2 {
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 700; letter-spacing: -0.025em; color: var(--cream);
    margin-bottom: 16px;
  }
  .cta-box p { font-size: 17px; color: rgba(250,249,246,0.55); margin-bottom: 40px; }
  .cta-install {
    display: inline-flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; padding: 14px 20px;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; color: var(--cream);
    margin-bottom: 32px; cursor: pointer;
    transition: background 0.2s;
  }
  .cta-install:hover { background: rgba(255,255,255,0.1); }
  .cta-install-label { color: rgba(250,249,246,0.4); font-size: 12px; }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 40px 24px;
    display: flex; align-items: center; justify-content: space-between;
    max-width: 1100px; margin: 0 auto;
    font-size: 13px; color: var(--muted);
  }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--dark); }

  /* SCROLL ANIMATIONS */
  .reveal {
    opacity: 0; transform: translateY(32px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    nav { padding: 16px 20px; }
    .nav-cta { display: none; }
    .feature-grid, .feature-grid.reverse { grid-template-columns: 1fr; gap: 40px; direction: ltr; }
    .feature-grid.reverse .feature-text { order: -1; }
    .stats-grid { grid-template-columns: 1fr; }
    .steps { grid-template-columns: 1fr; }
    .step-connector { display: none; }
    footer { flex-direction: column; gap: 16px; text-align: center; }
    .cta-box { padding: 48px 24px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="28" height="28" rx="8" fill="#1a1a1a"/>
      <path d="M8 20L14 8L20 20" stroke="#FAF9F6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M10 16.5H18" stroke="#E07A5F" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <span>Figma 图标技能</span>
    <span class="nav-badge">Claude Code</span>
  </div>
  <a href="#cta" class="nav-cta">立即安装</a>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-content">
    <div class="hero-eyebrow">Claude Code × Figma</div>
    <h1>让 Claude Code<br>在 Figma 中<em>画图标</em></h1>
    <p class="hero-tagline">用自然语言描述，AI 自动生成、整理、同步图标——从灵感到组件库，一气呵成。</p>
    <div class="hero-actions">
      <a href="#cta" class="btn-primary">安装技能</a>
      <a href="#features" class="btn-secondary">了解功能</a>
    </div>
    <div class="hero-demo">
      <div class="terminal">
        <div class="terminal-bar">
          <div class="terminal-dot"></div>
          <div class="terminal-dot"></div>
          <div class="terminal-dot"></div>
          <span class="terminal-title">claude — figma-icons</span>
        </div>
        <div class="terminal-body">
          <div><span class="t-prompt">❯ </span><span class="t-cmd">/figma-icons 画一套电商图标</span></div>
          <div class="t-comment">  # 购物车、收藏、订单、优惠券...</div>
          <div>&nbsp;</div>
          <div><span class="t-info">✦ 连接 Figma 画布...</span></div>
          <div><span class="t-info">✦ 生成 12 个图标（线框 + 填充 + 双色）</span></div>
          <div><span class="t-info">✦ 整理到 Icons/E-commerce 框架</span></div>
          <div><span class="t-success">✓ 完成！已同步到组件库</span></div>
        </div>
      </div>
    </div>
  </div>
</section>
